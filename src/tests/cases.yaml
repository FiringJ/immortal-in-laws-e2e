# E2E 视觉 Agent 测试用例 — 纯 Computer Use
# 所有操作通过 nut.js + 视觉 Agent 完成，不依赖 miniprogram-automator
#
# 步骤类型：
#   - act: "自然语言操作指令"   → 视觉模型决策 + nut.js 执行点击/输入
#   - assert: "自然语言断言"    → 视觉模型验证截图
#
# maxSteps 配置（每个 aiAct 的最大重试次数）：
#   - 全局默认：顶层 maxSteps
#   - suite 级：覆盖全局默认
#   - case 级：覆盖 suite 级和全局默认
#
# 注意：不再有 navigate 步骤，所有页面跳转通过 act 点击 UI 元素实现

# 全局默认：每个 aiAct 最多重试 5 次
maxSteps: 5

suites:
  - name: 首页
    setup:
      - act: 点击底部导航栏的"今日推荐"Tab
    cases:
      - name: 点击嘉宾卡片进入详情
        steps:
          - act: 点击第一个嘉宾卡片的主体区域（非"联系对方"按钮）
          - assert: 当前页面是嘉宾详情页，显示了该嘉宾的详细个人信息

  - name: 嘉宾详情页
    setup:
      - act: 点击底部导航栏的"首页"Tab
      - act: 点击第一个嘉宾卡片的主体区域进入详情
      - assert: 当前页面是嘉宾详情页
    cases:
      - name: "[P0] 详情页正常显示家长信息"
        issue: 未正常显示家长头像、姓氏称呼、亲属关系
        steps:
          - assert: 页面中显示了家长头像、姓氏和亲属关系（如"母亲"、"父亲"或"本人"）

      - name: "[P0] 现居地显示精确到区县"
        issue: 现居地要精确到区县
        steps:
          - assert: 现居地信息显示了具体的城市和区县，不是只有省份或地区代码

      - name: "[P0] 不显示地区代码"
        issue: 编辑资料中显示的是地区代码而不是汉字
        steps:
          - assert: 页面中没有显示纯数字的地区代码，所有地区信息都是中文地名

      - name: "[P1] 收藏按钮有未收藏/已收藏视觉区分"
        issue: 底部未收藏/已收藏按钮状态未做区分
        steps:
          - assert: 底部有"收藏"按钮，按钮处于未收藏状态（非高亮）
          - act: 点击底部的"收藏"按钮
          - assert: 收藏按钮变为已收藏状态（高亮或填充样式），与未收藏时有明显视觉区别

      - name: "[P0] 无手机号时不显示拨打电话按钮"
        issue: 机器人无电话号码时拨打电话按钮降低信任感
        steps:
          - assert: 如果当前嘉宾没有手机号，则底部没有"拨打电话"按钮

      - name: "[P0] 交换照片模块在更多信息之上"
        issue: 交换照片模块顺序错误
        steps:
          - assert: 页面中"交换照片"模块的位置在"更多信息"模块之上

  - name: 消息与私信
    setup:
      - act: 点击底部导航栏的"消息"Tab
    cases:
      - name: "[P0] 消息列表不显示乱码"
        issue: 消息列表中外面会显示乱码
        steps:
          - assert: 消息列表中的文字内容正常显示，没有乱码、方块字符或问号替代符

      - name: "[P0] 消息页点击看过我入口不出会员阻断弹框"
        issue: 在消息页点击看过我/收藏我/解锁我入口出会员阻断弹框
        steps:
          - act: 点击消息页上的"看过我"入口
          - assert: 进入了浏览记录页面，没有出现会员开通阻断弹框

      - name: "[P1] 聊天室点击顶部家长区域跳转详情页"
        issue: 聊天室页点击顶部家长红框区域应跳对方资料详情页
        steps:
          - act: 点击消息列表中的第一个会话进入聊天室
          - assert: 进入了私信聊天页面
          - act: 点击聊天页顶部的家长头像或名称区域
          - assert: 跳转到了对方的个人资料详情页

      - name: "[P2] 进入聊天室应定位到最新消息"
        issue: 消息聊天进入会话从头开始而不是定位到最新
        steps:
          - act: 点击消息列表中的第一个会话进入聊天室
          - assert: 聊天页面显示的是最新的消息，不需要向下滚动才能看到

  - name: 记录页
    cases:
      - name: "[P0] 浏览记录显示近14天记录提示"
        issue: 我看过的tab顶部缺少近14天浏览记录提示
        setup:
          - act: 点击底部导航栏的"首页"Tab
          - act: 点击首页上的"看过我"入口
        steps:
          - act: 点击"我看过"或"我看过的"tab
          - assert: 页面顶部显示了"近14天浏览记录"的提示文字，包含浏览人数

      - name: "[P1] 记录页标题区域直接显示tab"
        issue: 标题区域应直接放2个tab无需多余标题
        setup:
          - act: 点击底部导航栏的"首页"Tab
          - act: 点击首页上的"看过我"入口
        steps:
          - assert: 页面顶部标题区域直接显示了两个tab切换按钮，没有多余的页面标题

      - name: "[P0] 收藏记录点击嘉宾可跳转详情页"
        issue: 跳转至嘉宾详情页的热区点击需同首页一样优化
        setup:
          - act: 点击底部导航栏的"首页"Tab
          - act: 点击首页上的"收藏"入口
        steps:
          - assert: 收藏记录页正常显示，有嘉宾列表或空状态
          - act: 点击收藏列表中的第一个嘉宾卡片
          - assert: 跳转到了嘉宾详情页，显示了该嘉宾的详细信息

  - name: 精准查找
    setup:
      - act: 点击底部导航栏的"首页"Tab
      - act: 点击首页上的"精准查找"入口
    cases:
      - name: "[P0] 婚姻/房产/购车要求为单选"
        issue: 婚姻/房产/购车要求应为单选目前错误为多选
        steps:
          - act: 滚动页面找到"婚姻要求"筛选项
          - act: 点击"婚姻要求"中的第一个选项
          - act: 点击"婚姻要求"中的第二个选项
          - assert: 婚姻要求中只有一个选项被选中（单选），之前选中的已取消

      - name: "[P2] 地区要求没有不限选项"
        issue: 地区要求不应有不限和不填写选项
        steps:
          - act: 滚动页面找到"地区要求"筛选项
          - assert: 地区要求的选项中没有"不限"和"不填写"选项

      - name: "[P0] 点击搜索不报错"
        issue: 点击搜索查找结果报错加载失败
        steps:
          - act: 点击"立即搜索"按钮
          - assert: 没有出现"加载失败"的错误提示

  - name: 历史推荐
    setup:
      - act: 点击底部导航栏的"首页"Tab
      - act: 点击首页上的"历史推荐"入口
    cases:
      - name: "[P0] 非至尊会员点击日期筛选弹出会员阻断弹框"
        issue: 非至尊会员点击日期筛选时无反应
        steps:
          - act: 点击"日期筛选"按钮或日期选择入口
          - assert: 弹出了会员充值阻断弹框，或者日期筛选器正常打开（如果是至尊会员）

  - name: 超级曝光
    setup:
      - act: 点击底部导航栏的"我的"Tab
      - act: 点击"超级曝光"入口
    cases:
      - name: "[P0] 底部按钮进入会员页默认选中至尊会员"
        issue: 点击至尊会员可免费曝光按钮后错误选中黄金会员
        steps:
          - act: 点击底部的"至尊会员可免费曝光"按钮或类似入口
          - assert: 进入了会员开通页面，且默认选中了"至尊会员"tab

  - name: 会员中心
    setup:
      - act: 点击底部导航栏的"我的"Tab
      - act: 点击"会员中心"入口
    cases:
      - name: "[P0] 有黄金会员和至尊会员两个tab"
        issue: 黄金会员tab下缺少至尊会员价格档
        steps:
          - assert: 页面中同时存在"黄金会员"和"至尊会员"两个tab或选项

      - name: "[P0] 切换至尊会员tab后标题文案正确"
        issue: 标题文案需根据tab切换而变化
        steps:
          - act: 点击"至尊会员"tab
          - assert: 页面标题或描述中包含"至尊会员"相关文案

      - name: "[P1] 有购买说明入口"
        issue: 点击底部购买说明未出现弹框提示
        steps:
          - assert: 页面底部有"购买说明"文字或按钮入口

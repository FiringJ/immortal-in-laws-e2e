<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设计稿 vs 实现 · 视觉比对</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .controls label { display: flex; align-items: center; gap: 6px; }
    .controls input[type="text"] {
      width: 280px;
      padding: 8px 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #e0e0e0;
    }
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 900px) { .compare { grid-template-columns: 1fr; } }
    .panel {
      background: #252525;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .panel h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: #ffa726;
    }
    .panel.implement h2 { color: #66bb6a; }
    .panel .img-wrap {
      background: #111;
      border-radius: 8px;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    .panel .img-wrap img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
    }
    .panel .placeholder {
      color: #666;
      padding: 24px;
      font-size: 13px;
      line-height: 1.5;
    }
    .panel .placeholder a { color: #ffa726; }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>设计稿 vs 实现 · 视觉比对</h1>
  <div class="controls">
    <label>设计稿 (Figma) 截图路径（相对 screenshots/）：<input type="text" id="figma" placeholder="figma-history.png"></label>
    <label>当前实现截图路径（相对 screenshots/）：<input type="text" id="impl" placeholder="2026-03-01T02-03-30__mcp__history_current.png"></label>
    <button type="button" id="apply">应用</button>
  </div>
  <div class="compare">
    <div class="panel">
      <h2>设计稿 (Figma)</h2>
      <div class="img-wrap">
        <img id="figmaImg" alt="设计稿" style="display:none">
        <div id="figmaPlaceholder" class="placeholder">
          请先将 Figma MCP <code>get_screenshot</code> 的截图保存为 <code>screenshots/figma-&lt;页面名&gt;.png</code>（如 figma-history.png），再在上方填写文件名并点击「应用」。
        </div>
      </div>
    </div>
    <div class="panel implement">
      <h2>当前实现 (模拟器截图)</h2>
      <div class="img-wrap">
        <img id="implImg" alt="当前实现" style="display:none">
        <div id="implPlaceholder" class="placeholder">请在上方填写当前实现截图文件名并点击「应用」。</div>
      </div>
    </div>
  </div>
  <p class="hint">用于判断还原度：对比标题/正文字号、颜色、圆角、间距、底部栏渐变与按钮样式等。修改 wxss 后重新截图再刷新此页对比。</p>
  <script>
    var base = '../screenshots/';

    function getQuery(name) {
      var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
      return m ? decodeURIComponent(m[1]) : '';
    }
    function load() {
      var figma = document.getElementById('figma').value.trim() || getQuery('figma') || 'figma-history.png';
      var impl = document.getElementById('impl').value.trim() || getQuery('impl') || '2026-03-01T02-03-30__mcp__history_current.png';
      var figmaImg = document.getElementById('figmaImg');
      var figmaPh = document.getElementById('figmaPlaceholder');
      var implImg = document.getElementById('implImg');
      var implPh = document.getElementById('implPlaceholder');
      var figmaSrc = (base + figma).replace(/^screenshots\//, base);
      var implSrc = (base + impl).replace(/^screenshots\//, base);
      figmaImg.style.display = 'none';
      figmaPh.style.display = 'block';
      figmaImg.onerror = function() { figmaImg.style.display = 'none'; figmaPh.style.display = 'block'; };
      figmaImg.onload = function() { figmaImg.style.display = 'block'; figmaPh.style.display = 'none'; };
      figmaImg.src = figmaSrc;
      implImg.style.display = 'none';
      implPh.style.display = 'block';
      implImg.onerror = function() { implImg.style.display = 'none'; implPh.style.display = 'block'; };
      implImg.onload = function() { implImg.style.display = 'block'; implPh.style.display = 'none'; };
      implImg.src = implSrc;
      history.replaceState(null, '', '?figma=' + encodeURIComponent(figma) + '&impl=' + encodeURIComponent(impl));
    }
    document.getElementById('apply').onclick = load;
    if (location.search) {
      document.getElementById('figma').value = getQuery('figma') || 'figma-history.png';
      document.getElementById('impl').value = getQuery('impl') || '2026-03-01T02-03-30__mcp__history_current.png';
    }
    load();
  </script>
</body>
</html>
